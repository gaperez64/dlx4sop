name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
            simd: avx512
          - os: macos-14
            target: macos-arm64
            simd: neon

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: python -m pip install meson ninja

      - name: Configure
        run: meson setup build --buildtype=release -Db_lto=true -Dsimd=${{ matrix.simd }}

      - name: Build release binaries
        run: meson compile -C build qasm2sop sop-check sop-solve sop-stats sop2wmc

      - name: Package binaries
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA:0:7}"
          fi
          package="dlx4sop-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp build/qasm2sop build/sop-check build/sop-solve build/sop-stats build/sop2wmc README.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"
          echo "package=${package}" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.package }}
          path: |
            dist/${{ steps.package.outputs.package }}.tar.gz
            dist/${{ steps.package.outputs.package }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no release assets found" >&2
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
