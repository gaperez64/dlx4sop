name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
            simd: auto
            coverage: true
          - os: macos-14
            target: macos-arm64
            simd: neon
            coverage: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: python -m pip install meson ninja

      - name: Install coverage tools
        if: matrix.coverage
        run: python -m pip install gcovr

      - name: Configure
        run: meson setup build -Dsimd=${{ matrix.simd }}

      - name: Test
        run: meson test -C build --print-errorlogs

      - name: Coverage
        if: matrix.coverage
        run: scripts/check-coverage.sh
